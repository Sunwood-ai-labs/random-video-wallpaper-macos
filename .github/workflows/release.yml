name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.2.0
        required: true
      create_release:
        description: Create a draft GitHub Release
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build app bundle, zip, and DMG
        env:
          VERSION: ${{ inputs.version }}
        run: scripts/build-release-app
      - name: Upload packaged app artifacts
        uses: actions/upload-artifact@v7
        with:
          name: RandomVideoWallpaper-${{ inputs.version }}
          path: |
            dist/*.zip
            dist/*.dmg
      - name: Create draft release
        if: inputs.create_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" dist/*.zip dist/*.dmg \
            --draft \
            --title "Random Video Wallpaper ${{ inputs.version }}" \
            --notes "Unsigned preview build. For public distribution, sign with Developer ID and notarize before publishing as a final release."
